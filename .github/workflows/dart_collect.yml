name: Daily DART Collection

on:
  schedule:
    - cron: '0 0 * * 1-5'  # 평일 오전 9시 KST (UTC 00:00)
  workflow_dispatch:         # 수동 실행 가능

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install httpx

      - name: Collect DART disclosures
        run: python bot/dart_collector.py
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}

      - name: Commit new sources
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sources/dart/
          git diff --staged --quiet || git commit -m "dart: 공시 자동 수집 $(date '+%Y-%m-%d')"
          git diff --staged --quiet || git push
